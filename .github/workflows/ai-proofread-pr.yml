name: AI Proofread and Auto Fix PR

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to proofread and merge'
        required: true
        type: number

jobs:
  proofread:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    
    outputs:
      needs_fix: ${{ steps.check-issues.outputs.needs_fix }}
      fix_applied: ${{ steps.auto-fix.outputs.fix_applied }}
    
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || format('refs/pull/{0}/head', github.event.inputs.pr_number) }}

      - name: Setup Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Get changed files
        id: changed-files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 获取 PR 号
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          
          # 获取变更的 markdown 文件
          CHANGED_FILES=$(gh pr diff "$PR_NUMBER" --name-only | grep "^docs/.*\.md$" || true)
          
          if [ -n "$CHANGED_FILES" ]; then
            echo "changed_files<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
            
            echo "📋 变更的文档文件："
            echo "$CHANGED_FILES"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 没有变更的文档文件"
          fi

      - name: Check for placeholders
        id: check-placeholders
        if: steps.changed-files.outputs.has_changes == 'true'
        run: |
          echo "🔍 检查翻译文件中是否存在占位符问题..."
          
          # 检查 docs 目录中是否有占位符
          PLACEHOLDER_FILES=$(grep -r -l "__LINK_\|__HTML_TAG_\|__INLINE_CODE_\|__CODE_BLOCK_" docs/ 2>/dev/null || true)
          PLACEHOLDER_COUNT=$(echo "$PLACEHOLDER_FILES" | grep -c "." || echo "0")
          
          if [ "$PLACEHOLDER_COUNT" -gt 0 ]; then
            echo "❌ 发现 $PLACEHOLDER_COUNT 个文件存在占位符问题"
            echo "has_placeholders=true" >> $GITHUB_OUTPUT
            
            # 保存有问题的文件列表
            echo "placeholder_files<<EOF" >> $GITHUB_OUTPUT
            echo "$PLACEHOLDER_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            
            # 列出有问题的文件
            echo "📋 存在占位符问题的文件："
            echo "$PLACEHOLDER_FILES"
          else
            echo "✅ 未发现占位符问题"
            echo "has_placeholders=false" >> $GITHUB_OUTPUT
          fi

      - name: AI Proofread
        id: ai-proofread
        if: steps.changed-files.outputs.has_changes == 'true' && steps.check-placeholders.outputs.has_placeholders != 'true'
        run: |
          echo "🤖 开始 AI 校对..."
          
          # 创建校对脚本
          cat > /tmp/proofread.js << 'SCRIPT'
          const fs = require('fs');
          const path = require('path');
          
          async function proofreadWithAI(content, filePath) {
            const response = await fetch('https://api.cloudflare.com/client/v4/accounts/' + process.env.CLOUDFLARE_ACCOUNT_ID + '/ai/run/@cf/meta/llama-3-8b-instruct', {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ' + process.env.CLOUDFLARE_API_TOKEN,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                messages: [
                  {
                    role: 'system',
                    content: `你是一个专业的技术文档校对专家。请检查以下中文翻译文档的质量。

校对要求：
1. 检查是否有明显的翻译错误
2. 检查是否有未翻译的英文内容（代码和专有名词除外）
3. 检查是否有格式问题

如果发现问题，请按以下格式回复：
## 问题列表
- 文件: xxx.md
  问题: 具体问题描述
  建议: 建议的修复方案

如果没有问题，请回复 "✅ 校对通过"。

文件路径: ${filePath}`
                  },
                  {
                    role: 'user',
                    content: content.substring(0, 4000)
                  }
                ],
                max_tokens: 1000
              })
            });
            
            const data = await response.json();
            return data.result?.response || '校对失败';
          }
          
          async function main() {
            const changedFiles = process.env.CHANGED_FILES.split('\n').filter(f => f.trim());
            const results = [];
            const issues = [];
            
            for (const file of changedFiles.slice(0, 5)) {
              try {
                const content = fs.readFileSync(file, 'utf8');
                const result = await proofreadWithAI(content, file);
                results.push({ file, result });
                
                if (result.includes('问题') && !result.includes('校对通过')) {
                  issues.push({ file, result });
                }
                
                console.log(`✅ 校对完成: ${file}`);
              } catch (error) {
                console.error(`❌ 校对失败: ${file}`, error.message);
                results.push({ file, result: '校对失败: ' + error.message });
              }
            }
            
            fs.writeFileSync('/tmp/proofread-results.json', JSON.stringify(results, null, 2));
            fs.writeFileSync('/tmp/proofread-issues.json', JSON.stringify(issues, null, 2));
          }
          
          main().catch(console.error);
SCRIPT

          # 运行校对脚本
          CHANGED_FILES="${{ steps.changed-files.outputs.changed_files }}" \
          node /tmp/proofread.js || true
          
          # 检查校对结果
          if [ -f "/tmp/proofread-results.json" ]; then
            echo "📋 校对结果："
            cat /tmp/proofread-results.json
            
            # 检查是否有问题
            ISSUES_COUNT=$(cat /tmp/proofread-issues.json | jq 'length' 2>/dev/null || echo "0")
            
            if [ "$ISSUES_COUNT" -gt 0 ]; then
              echo "proofread_passed=false" >> $GITHUB_OUTPUT
              echo "issues_count=$ISSUES_COUNT" >> $GITHUB_OUTPUT
            else
              echo "proofread_passed=true" >> $GITHUB_OUTPUT
              echo "issues_count=0" >> $GITHUB_OUTPUT
            fi
          else
            echo "proofread_passed=true" >> $GITHUB_OUTPUT
            echo "issues_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Check if needs fix
        id: check-issues
        run: |
          NEEDS_FIX="false"
          ISSUES=""
          
          # 检查占位符问题
          if [ "${{ steps.check-placeholders.outputs.has_placeholders }}" == "true" ]; then
            NEEDS_FIX="true"
            ISSUES="placeholders"
          fi
          
          # 检查校对问题
          if [ "${{ steps.ai-proofread.outputs.proofread_passed }}" == "false" ]; then
            NEEDS_FIX="true"
            ISSUES="${ISSUES},proofread"
          fi
          
          echo "needs_fix=$NEEDS_FIX" >> $GITHUB_OUTPUT
          echo "issues=$ISSUES" >> $GITHUB_OUTPUT
          
          echo "📋 检查结果: needs_fix=$NEEDS_FIX, issues=$ISSUES"

      - name: Auto fix placeholder issues
        id: auto-fix-placeholders
        if: steps.check-placeholders.outputs.has_placeholders == 'true'
        run: |
          echo "🔧 自动修复占位符问题..."
          
          PLACEHOLDER_FILES="${{ steps.check-placeholders.outputs.placeholder_files }}"
          FIXED_COUNT=0
          
          for file in $PLACEHOLDER_FILES; do
            if [ -f "$file" ]; then
              echo "📝 尝试修复: $file"
              
              # 获取对应的 content 文件
              CONTENT_FILE="${file/docs\//content/}"
              
              if [ -f "$CONTENT_FILE" ]; then
                echo "  从源文件重新翻译: $CONTENT_FILE"
                
                # 重新翻译该文件
                bun run translate-docs:single "$CONTENT_FILE" "$file" 2>/dev/null || {
                  echo "  ⚠️ 翻译失败，尝试从 git 历史恢复"
                  
                  # 尝试从最近的好的 commit 恢复
                  LAST_GOOD_COMMIT=$(git log --oneline --all -- "$file" | grep -v "Sync official" | head -1 | awk '{print $1}')
                  
                  if [ -n "$LAST_GOOD_COMMIT" ]; then
                    echo "  从 commit $LAST_GOOD_COMMIT 恢复"
                    git checkout "$LAST_GOOD_COMMIT" -- "$file" || echo "  ⚠️ 恢复失败"
                    FIXED_COUNT=$((FIXED_COUNT + 1))
                  fi
                }
              else
                echo "  ⚠️ 源文件不存在: $CONTENT_FILE"
              fi
            fi
          done
          
          echo "fixed_count=$FIXED_COUNT" >> $GITHUB_OUTPUT
          echo "✅ 修复了 $FIXED_COUNT 个文件"

      - name: Auto fix proofread issues
        id: auto-fix-proofread
        if: steps.ai-proofread.outputs.proofread_passed == 'false'
        run: |
          echo "🔧 自动修复校对问题..."
          
          if [ -f "/tmp/proofread-issues.json" ]; then
            ISSUES=$(cat /tmp/proofread-issues.json)
            FIXED_COUNT=0
            
            # 解析问题文件
            ISSUE_FILES=$(cat /tmp/proofread-issues.json | jq -r '.[].file' 2>/dev/null || true)
            
            for file in $ISSUE_FILES; do
              if [ -f "$file" ]; then
                echo "📝 尝试重新翻译: $file"
                
                # 获取对应的 content 文件
                CONTENT_FILE="${file/docs\//content/}"
                
                if [ -f "$CONTENT_FILE" ]; then
                  # 重新翻译
                  bun run translate-docs:single "$CONTENT_FILE" "$file" 2>/dev/null && {
                    FIXED_COUNT=$((FIXED_COUNT + 1))
                    echo "  ✅ 重新翻译成功"
                  } || {
                    echo "  ⚠️ 重新翻译失败"
                  }
                fi
              fi
            done
            
            echo "fixed_count=$FIXED_COUNT" >> $GITHUB_OUTPUT
            echo "✅ 修复了 $FIXED_COUNT 个文件"
          fi

      - name: Commit fixes to PR
        id: auto-fix
        if: steps.check-issues.outputs.needs_fix == 'true'
        run: |
          # 检查是否有变更
          git add .
          if git diff --cached --quiet; then
            echo "ℹ️ 没有需要提交的修复"
            echo "fix_applied=false" >> $GITHUB_OUTPUT
          else
            echo "📝 提交自动修复..."
            
            # 获取当前重试次数
            PR_NUMBER="${{ steps.changed-files.outputs.pr_number }}"
            COMMIT_MSG="🔧 Auto-fix: 修复翻译问题 (PR #$PR_NUMBER)"
            
            git commit -m "$COMMIT_MSG"
            git push
            
            echo "fix_applied=true" >> $GITHUB_OUTPUT
            echo "✅ 已提交自动修复，将触发新的校对"
          fi

      - name: Create PR comment
        if: always() && steps.changed-files.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.changed-files.outputs.pr_number }}"
          
          # 构建评论内容
          COMMENT_BODY="## 🤖 AI 校对报告

### 校对状态

"
          
          if [ "${{ steps.check-placeholders.outputs.has_placeholders }}" == "true" ]; then
            COMMENT_BODY="${COMMENT_BODY}- ❌ **占位符检查**: 发现问题
"
          else
            COMMENT_BODY="${COMMENT_BODY}- ✅ **占位符检查**: 通过
"
          fi
          
          if [ "${{ steps.ai-proofread.outputs.proofread_passed }}" == "true" ]; then
            COMMENT_BODY="${COMMENT_BODY}- ✅ **AI 校对**: 通过
"
          elif [ "${{ steps.ai-proofread.outputs.proofread_passed }}" == "false" ]; then
            COMMENT_BODY="${COMMENT_BODY}- ⚠️ **AI 校对**: 发现 ${{ steps.ai-proofread.outputs.issues_count }} 个问题
"
          else
            COMMENT_BODY="${COMMENT_BODY}- ➖ **AI 校对**: 跳过
"
          fi
          
          # 自动修复状态
          if [ "${{ steps.auto-fix.outputs.fix_applied }}" == "true" ]; then
            COMMENT_BODY="${COMMENT_BODY}- 🔄 **自动修复**: 已应用，等待重新校对
"
          fi
          
          # 添加校对结果
          if [ -f "/tmp/proofread-results.json" ]; then
            COMMENT_BODY="${COMMENT_BODY}

### 详细校对结果

\`\`\`json
$(cat /tmp/proofread-results.json | jq -r '.[] | "📄 \(.file)\n\(.result)\n"' | head -50)
\`\`\`
"
          fi
          
          # 添加占位符问题
          if [ "${{ steps.check-placeholders.outputs.has_placeholders }}" == "true" ]; then
            COMMENT_BODY="${COMMENT_BODY}

### ⚠️ 占位符问题

以下文件存在占位符问题：
\`\`\`
${{ steps.check-placeholders.outputs.placeholder_files }}
\`\`\`
"
          fi
          
          COMMENT_BODY="${COMMENT_BODY}

---
*此评论由 AI 校对工作流自动生成*
"
          
          # 发布评论
          echo "$COMMENT_BODY" | gh pr comment "$PR_NUMBER" --body-file -

      - name: Auto merge PR
        if: |
          steps.check-issues.outputs.needs_fix != 'true' &&
          steps.auto-fix.outputs.fix_applied != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.changed-files.outputs.pr_number }}"
          
          echo "✅ 校对通过，准备合并 PR #$PR_NUMBER"
          
          # 等待一段时间，让其他检查完成
          sleep 30
          
          # 检查 PR 状态
          PR_STATE=$(gh pr view "$PR_NUMBER" --json state,mergeable,mergeStateStatus --jq '{state: .state, mergeable: .mergeable, mergeStateStatus: .mergeStateStatus}')
          
          echo "📋 PR 状态: $PR_STATE"
          
          STATE=$(echo "$PR_STATE" | jq -r '.state')
          MERGEABLE=$(echo "$PR_STATE" | jq -r '.mergeable')
          MERGE_STATE=$(echo "$PR_STATE" | jq -r '.mergeStateStatus')
          
          if [ "$STATE" == "OPEN" ] && [ "$MERGEABLE" == "MERGEABLE" ]; then
            echo "🔄 合并 PR..."
            gh pr merge "$PR_NUMBER" --squash --delete-branch
            echo "✅ PR 已合并"
          else
            echo "⚠️ PR 无法自动合并"
            echo "状态: $STATE"
            echo "可合并: $MERGEABLE"
            echo "合并状态: $MERGE_STATE"
            
            # 添加评论说明原因
            gh pr comment "$PR_NUMBER" --body "## ⚠️ 无法自动合并

PR 当前状态无法自动合并：
- **状态**: $STATE
- **可合并**: $MERGEABLE
- **合并状态**: $MERGE_STATE

请手动检查并合并此 PR。
"
          fi

      - name: Create summary
        if: always()
        run: |
          echo "## 🤖 AI 校对摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **PR 号**: ${{ steps.changed-files.outputs.pr_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **占位符检查**: ${{ steps.check-placeholders.outputs.has_placeholders == 'true' && '❌ 失败' || '✅ 通过' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **AI 校对**: ${{ steps.ai-proofread.outputs.proofread_passed == 'true' && '✅ 通过' || (steps.ai-proofread.outputs.proofread_passed == 'false' && '⚠️ 有问题') || '➖ 跳过' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **自动修复**: ${{ steps.auto-fix.outputs.fix_applied == 'true' && '✅ 已应用' || '➖ 无需修复' }}" >> $GITHUB_STEP_SUMMARY
