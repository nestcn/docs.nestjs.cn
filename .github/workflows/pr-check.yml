name: PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Validate translation quality
        run: |
          echo "🔍 Checking translation quality..."
          bun run validate-translation
          echo "✅ Translation quality check passed"

      - name: Check for placeholder leaks
        run: |
          echo "🔍 Checking for placeholder leaks..."
          bun run check-placeholders
          echo "✅ No placeholder issues found"

      - name: Build project
        run: bun run build
