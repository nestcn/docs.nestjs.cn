name: Sync Official NestJS Docs

on:
  schedule:
    # 每天 UTC 时间 02:00 运行（北京时间 10:00）
    - cron: '0 2 * * *'
  workflow_dispatch:
    # 允许手动触发

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    
    env:
      # Cloudflare Workers AI 配置
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Clone official NestJS docs repository
        run: |
          git clone --depth 1 https://github.com/nestjs/docs.nestjs.com.git official-docs

      - name: Compare and sync content folder
        id: sync-content
        run: |
          if [ ! -d "official-docs/content" ]; then
            echo "❌ 官方仓库中未找到 content 文件夹"
            exit 1
          fi
          
          echo "🔍 正在比较 content 文件夹..."
          CONTENT_CHANGED=false
          
          # 检查 content 文件夹是否存在差异
          if [ -d "content" ]; then
            # 使用 rsync 的 dry-run 模式检查差异
            if ! rsync -avui --dry-run --delete official-docs/content/ content/ > /tmp/content-diff.log 2>&1; then
              CONTENT_CHANGED=true
            elif [ -s /tmp/content-diff.log ]; then
              # 检查是否有实际的文件差异（过滤掉仅有的时间戳差异）
              if grep -E "^(deleting|>|<|\*)" /tmp/content-diff.log > /dev/null; then
                CONTENT_CHANGED=true
              fi
            fi
          else
            echo "📁 本地不存在 content 文件夹，将创建"
            CONTENT_CHANGED=true
          fi
          
          if [ "$CONTENT_CHANGED" = true ]; then
            echo "📋 检测到内容变更："
            cat /tmp/content-diff.log || echo "初始同步 - 无差异日志可用"
            
            # 移除旧的 content 并同步新内容
            echo "🔄 正在同步 content 文件夹..."
            rm -rf content
            cp -r official-docs/content ./
            echo "✅ content 文件夹同步成功"
            echo "content_changed=true" >> $GITHUB_OUTPUT
          else
            echo "✅ content 文件夹已是最新版本，无需更改"
            echo "content_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Snapshot original content to upstream-sync branch
        if: steps.sync-content.outputs.content_changed == 'true'
        continue-on-error: true
        run: |
          echo "📸 Creating snapshot of original content..."
          
          # Config git user
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Create/switch to temp branch for snapshot
          git checkout --orphan upstream-sync-temp
          git rm -rf .
          
          # Copy fresh content from official-docs
          cp -r official-docs/content ./content
          
          # Add and commit
          git add content
          git commit -m "📸 Snapshot upstream content: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          
          # Push to upstream-sync branch (force update)
          git push origin upstream-sync-temp:upstream-sync --force
          
          echo "✅ Snapshot pushed to upstream-sync"
          
          # Switch back to main to continue workflow
          git checkout main
          
          # VITAL FIX: git checkout main restores the working tree to the current state of main, 
          # effectively ERASING the newly updated content folder. We must re-copy it!
          rm -rf content
          cp -r official-docs/content ./content

      - name: Compare and sync assets folder
        id: sync-assets
        run: |
          ASSETS_CHANGED=false
          
          if [ -d "official-docs/src/assets" ]; then
            echo "🔍 正在比较 assets 文件夹..."
            
            # 创建 public 目录（如果不存在）
            mkdir -p public
            
            # 检查 assets 文件夹是否存在差异
            if [ -d "public/assets" ]; then
              # 使用 rsync 的 dry-run 模式检查差异
              if ! rsync -avui --dry-run --delete official-docs/src/assets/ public/assets/ > /tmp/assets-diff.log 2>&1; then
                ASSETS_CHANGED=true
              elif [ -s /tmp/assets-diff.log ]; then
                # 检查是否有实际的文件差异
                if grep -E "^(deleting|>|<|\*)" /tmp/assets-diff.log > /dev/null; then
                  ASSETS_CHANGED=true
                fi
              fi
            else
              echo "📁 本地不存在 assets 文件夹，将创建"
              ASSETS_CHANGED=true
            fi
            
            if [ "$ASSETS_CHANGED" = true ]; then
              echo "📋 检测到资源变更："
              cat /tmp/assets-diff.log || echo "初始同步 - 无差异日志可用"
              
              # 同步新资源
              echo "🔄 正在同步 assets 文件夹..."
              rsync -av --delete official-docs/src/assets/ public/assets/
              echo "✅ assets 文件夹同步成功"
              echo "assets_changed=true" >> $GITHUB_OUTPUT
            else
              echo "✅ assets 文件夹已是最新版本，无需更改"
              echo "assets_changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️ 官方仓库中未找到 assets 文件夹，跳过..."
            echo "assets_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Clean up
        run: |
          rm -rf official-docs

      - name: Process and translate content changes
        id: translate-content
        if: steps.sync-content.outputs.content_changed == 'true'
        run: |
          echo "🔄 正在处理内容变更并进行翻译..."
          
          # 检查是否有可用的 Cloudflare 配置
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "✅ Cloudflare Workers AI 已配置，使用 AI 翻译"
            if bun run translate-docs:verbose; then
              echo "✅ 翻译完成，有内容更新"
              echo "translation_changed=true" >> $GITHUB_OUTPUT
            else
              TRANSLATION_EXIT_CODE=$?
              if [ $TRANSLATION_EXIT_CODE -eq 1 ]; then
                echo "✅ 翻译完成，但无需更新"
                echo "translation_changed=false" >> $GITHUB_OUTPUT
              else
                echo "❌ 翻译失败，退出代码 $TRANSLATION_EXIT_CODE"
                echo "translation_changed=error" >> $GITHUB_OUTPUT
                exit 1
              fi
            fi
          else
            echo "⚠️ 未配置 Cloudflare API 凭据，使用仅格式化模式"
            if bun run translate-docs:no-ai; then
              echo "✅ 格式处理完成，有内容更新"
              echo "translation_changed=true" >> $GITHUB_OUTPUT
            else
              TRANSLATION_EXIT_CODE=$?
              if [ $TRANSLATION_EXIT_CODE -eq 1 ]; then
                echo "✅ 格式处理完成，但无需更新"
                echo "translation_changed=false" >> $GITHUB_OUTPUT
              else
                echo "❌ 格式处理失败，退出代码 $TRANSLATION_EXIT_CODE"
                echo "translation_changed=error" >> $GITHUB_OUTPUT
                exit 1
              fi
            fi
          fi

      - name: Fix code blocks and template syntax
        if: steps.translate-content.outputs.translation_changed == 'true'
        run: |
          echo "🔧 正在运行代码块和模板语法修复..."
          bun run fix-all
          echo "✅ 代码格式化完成"

      - name: Check translation integrity
        id: check-integrity
        if: steps.translate-content.outputs.translation_changed == 'true'
        run: |
          echo "🔍 正在检查翻译完整性..."
          if bun run check-translation-integrity; then
            echo "✅ 翻译完整性检查通过"
            echo "integrity_passed=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ 翻译完整性检查发现问题"
            echo "integrity_passed=false" >> $GITHUB_OUTPUT
            echo "📋 将在 PR 中标记需要人工校对"
          fi

      - name: Check for placeholders
        id: check-placeholders
        run: |
          echo "🔍 检查翻译文件中是否存在占位符问题..."
          
          # 检查 docs 目录中是否有占位符
          PLACEHOLDER_COUNT=$(grep -r -c "__LINK_\|__HTML_TAG_\|__INLINE_CODE_\|__CODE_BLOCK_" docs/ 2>/dev/null | grep -v ":0$" | wc -l || echo "0")
          
          if [ "$PLACEHOLDER_COUNT" -gt 0 ]; then
            echo "❌ 发现 $PLACEHOLDER_COUNT 个文件存在占位符问题"
            echo "has_placeholders=true" >> $GITHUB_OUTPUT
            
            # 列出有问题的文件
            echo "📋 存在占位符问题的文件："
            grep -r -l "__LINK_\|__HTML_TAG_\|__INLINE_CODE_\|__CODE_BLOCK_" docs/ 2>/dev/null || true
          else
            echo "✅ 未发现占位符问题"
            echo "has_placeholders=false" >> $GITHUB_OUTPUT
          fi

      - name: Check internal links
        if: always() 
        run: |
          echo "🔗 正在检查内部链接..."
          bun run check-links || echo "⚠️ Found broken links"

      - name: Update README sync time and check for changes
        id: changes
        run: |
          # 如果有内容同步或翻译更新，更新 README 中的同步时间
          if [ "${{ steps.sync-content.outputs.content_changed }}" == "true" ] || [ "${{ steps.translate-content.outputs.translation_changed }}" == "true" ] || [ "${{ steps.sync-assets.outputs.assets_changed }}" == "true" ]; then
            echo "📅 正在更新 README.md 中的同步时间..."
            
            # 获取当前时间（北京时间）- 格式: 2025年07月01日 17:48
            SYNC_TIME=$(TZ='Asia/Shanghai' date '+%Y年%m月%d日 %H:%M')
            
            # 更新 README.md 中的同步时间标记
            sed -i "s|<!-- LAST_SYNC_TIME -->.*<!-- /LAST_SYNC_TIME -->|<!-- LAST_SYNC_TIME --> $SYNC_TIME <!-- /LAST_SYNC_TIME -->|g" README.md
            
            echo "✅ 同步时间已更新为: $SYNC_TIME"
          fi
          
          # 检查是否有变更需要提交
          git add .
          if git diff --cached --quiet; then
            echo "未检测到变更"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "检测到变更"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            
            # 输出变更的文件列表
            echo "📋 变更的文件："
            git diff --cached --name-status
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 生成 PR 标题
          SYNC_DATE=$(date -u '+%Y-%m-%d')
          PR_TITLE="🔄 Sync official NestJS docs - $SYNC_DATE"
          
          # 生成 PR 描述
          PR_BODY="## 📋 同步摘要

          ### 同步信息
          - **同步日期**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - **源仓库**: https://github.com/nestjs/docs.nestjs.com

          ### 变更类型
          "
          
          if [ "${{ steps.sync-content.outputs.content_changed }}" == "true" ]; then
            PR_BODY="${PR_BODY}
          - ✅ 内容同步：检测到变更并已翻译
          "
          fi
          
          if [ "${{ steps.translate-content.outputs.translation_changed }}" == "true" ]; then
            PR_BODY="${PR_BODY}
          - ✅ 翻译更新：使用 Cloudflare Workers AI 更新
          "
          fi
          
          if [ "${{ steps.sync-assets.outputs.assets_changed }}" == "true" ]; then
            PR_BODY="${PR_BODY}
          - ✅ 资源同步：检测到变更并已同步
          "
          fi

          if [ "${{ steps.check-placeholders.outputs.has_placeholders }}" == "true" ]; then
            PR_BODY="${PR_BODY}

          ### ⚠️ 警告
          检测到翻译文件中存在占位符问题，请在校对时注意检查。
          "
          fi

          if [ "${{ steps.check-integrity.outputs.integrity_passed }}" == "false" ]; then
            PR_BODY="${PR_BODY}

          ### ⚠️ 翻译完整性警告
          检测到部分翻译可能不完整，请在校对时重点检查以下文件：
          - 内容行数比例过低
          - 代码块数量不匹配
          - 中文字符数量不足

          建议运行 \`bun run check-translation-integrity:verbose\` 查看详细信息。
          "
          fi
          
          PR_BODY="${PR_BODY}

          ### 变更文件
          \`\`\`
          $(git diff --cached --name-status)
          \`\`\`

          ---
          *此 PR 由自动化工作流创建，请在校对后合并。*
          "
          
          # 创建分支名
          BRANCH_NAME="sync/docs-${SYNC_DATE}"
          
          # 创建并切换到新分支
          git checkout -b "$BRANCH_NAME"
          
          # 提交变更
          git commit -m "$PR_TITLE"
          
          # 推送分支
          git push origin "$BRANCH_NAME" --force
          
          # 检查是否已存在相同的 PR
          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number' 2>/dev/null || echo "")
          
          if [ -n "$EXISTING_PR" ]; then
            echo "📝 更新已存在的 PR #$EXISTING_PR"
            gh pr edit "$EXISTING_PR" --title "$PR_TITLE" --body "$PR_BODY"
          else
            echo "📝 创建新的 PR"
            gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --base main \
              --head "$BRANCH_NAME" \
              --label "sync,translation"
          fi

      - name: Update sync time badge JSON (Gist) - Always run
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          echo "🔄 正在更新 Gist 同步时间徽章..."
          SYNC_TIME=$(TZ='Asia/Shanghai' date '+%Y年%m月%d日')
          
          # 根据是否有内容变更设置不同颜色
          if [ "${{ steps.sync-content.outputs.content_changed }}" == "true" ] || [ "${{ steps.translate-content.outputs.translation_changed }}" == "true" ] || [ "${{ steps.sync-assets.outputs.assets_changed }}" == "true" ]; then
            COLOR="brightgreen"
            echo "📋 检测到内容变更，使用绿色徽章"
          else
            COLOR="blue" 
            echo "📋 无内容变更，使用蓝色徽章"
          fi
          
          cat > sync-summary.json <<EOF
          {
            "schemaVersion": 1,
            "label": "同步时间",
            "message": "$SYNC_TIME",
            "color": "$COLOR"
          }
          EOF
          gist_id="b3a004684a48178741a9ab9e1a90ab3e"
          file_name="nestjscn-sync-time.json"
          
          # 确保 jq 可用
          if ! command -v jq &> /dev/null; then
            echo "安装 jq..."
            sudo apt-get update && sudo apt-get install -y jq
          fi
          
          # 检查是否有 GIST_TOKEN
          if [ -z "$GIST_TOKEN" ]; then
            echo "⚠️ 未配置 GIST_TOKEN，跳过 Gist 更新"
            exit 0
          fi
          
          # 更新 Gist
          response=$(curl -s -X PATCH "https://api.github.com/gists/$gist_id" \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -d "{\"files\": {\"$file_name\": {\"content\": $(jq -Rs . < sync-summary.json)}}}")
          
          if echo "$response" | jq -e '.files' > /dev/null 2>&1; then
            echo "✅ Gist 同步时间徽章更新成功: $SYNC_TIME (颜色: $COLOR)"
          else
            echo "❌ Gist 更新失败:"
            echo "$response"
            echo "继续执行后续步骤..."
          fi

      - name: Create summary
        run: |
          echo "## 📋 同步摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **同步日期**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **源仓库**: https://github.com/nestjs/docs.nestjs.com" >> $GITHUB_STEP_SUMMARY
          
          # Content 同步状态
          if [ "${{ steps.sync-content.outputs.content_changed }}" == "true" ]; then
            echo "- **内容同步**: ✅ 是（检测到变更并应用）" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **内容同步**: ✅ 已是最新（无需更改）" >> $GITHUB_STEP_SUMMARY
          fi
          
          # 翻译状态
          if [ "${{ steps.translate-content.outputs.translation_changed }}" == "true" ]; then
            echo "- **翻译更新**: ✅ 是（使用 Cloudflare Workers AI 更新了 docs 文件夹）" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.translate-content.outputs.translation_changed }}" == "false" ]; then
            echo "- **翻译更新**: ✅ 已是最新（无需翻译更改）" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.sync-content.outputs.content_changed }}" == "true" ]; then
            echo "- **翻译更新**: ⚠️ 内容已变更但跳过了翻译" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **翻译更新**: ➖ 无内容变更需要翻译" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Assets 同步状态
          if [ "${{ steps.sync-assets.outputs.assets_changed }}" == "true" ]; then
            echo "- **资源同步**: ✅ 是（检测到变更并应用）" >> $GITHUB_STEP_SUMMARY
          elif [ -d "public/assets" ]; then
            echo "- **资源同步**: ✅ 已是最新（无需更改）" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **资源同步**: ⚠️ 源中未找到" >> $GITHUB_STEP_SUMMARY
          fi
          
          # PR 状态
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "- **PR 创建**: ✅ 是，已创建 PR 等待校对合并" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **PR 创建**: ❌ 无变更需要提交" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "## ❌ 同步失败" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "同步操作失败。请检查日志了解详细信息。" >> $GITHUB_STEP_SUMMARY
          echo "您可以手动重新触发此工作流或调查问题。" >> $GITHUB_STEP_SUMMARY
